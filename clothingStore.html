<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/zeroing.css">
    <title>Hoodie land</title>
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <div class="header__container _container">
                <a href="" class="header__logo">Hoodie <br/>land</a>
                <nav class="header__menu menu">
                    <ul class="menu__list">
                        <li class="menu__item">
                            <a href="" class="menu__link">Главная</a>
                        </li>
                        <li class="menu__item">
                            <a href="" class="menu__link">Каталог</a>
                        </li>
                        <li class="menu__item">
                            <a href="" class="menu__link">Выгода</a>
                        </li>
                        <li class="menu__item">
                            <a href="" class="menu__link">Примерка</a>
                        </li>
                        <li class="menu__item">
                            <a href="" class="menu__link">О бренде</a>
                        </li>
                        <li class="menu__item">
                            <a href="" class="menu__link">Контакты</a>
                        </li>
                    </ul>
                </nav>
                <div class="header__icons">
                    <div class="search">
                        <img src="img/header/icons/search.png" alt="search">
                    </div>
                    <div class="favorites">
                        <img src="img/header/icons/favorites.png" alt="favorites">
                    </div>
                    <div class="basket">
                        <img src="img/header/icons/basket.png" alt="basket">
                    </div>
                    <div class="header__burger burger">
                        <img src="img/header/icons/burger-menu.png" alt="burger-menu">
                    </div>
                </div>
            </div>
        </header>
        <main class="main">
            <div class="main__main-block"></div>
        </main>
        <footer class="footer">подвал</footer>
        <script src="js/script.js"></script>
    </div>
</body>
</html>
